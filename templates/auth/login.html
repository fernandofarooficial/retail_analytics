{% extends 'base.html' %}

{% block title %}Login — Retail Analytics{% endblock %}

{% block body %}
<div class="login-page">

    <div class="login-card">

        <div class="login-header">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="48" height="48" rx="12" fill="#F47B20"/>
                    <path d="M10 34L18 14H22L24 20L26 14H30L38 34H34L32 28H16L14 34H10Z" fill="white"/>
                    <circle cx="24" cy="24" r="3" fill="white"/>
                </svg>
            </div>
            <h1 class="login-title">Retail Analytics</h1>
            <p class="login-subtitle">Acesse sua conta</p>
        </div>

        <form class="login-form" method="POST" action="{{ url_for('auth.login') }}">

            {% if error %}
            <div class="alert alert-error">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="7" stroke="#c0392b" stroke-width="1.5"/>
                    <path d="M8 4v5M8 11v1" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <div class="form-group">
                <label for="username">Usuário</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="seu.usuario"
                    autocomplete="username"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="input-password">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-password" aria-label="Mostrar senha" onclick="togglePassword()">
                        <svg id="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary">Entrar</button>

        </form>

    </div>

    <p class="login-footer">
        &copy; {{ now.year }} Retail Analytics BR
    </p>

</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const eye   = document.getElementById('icon-eye');
    const eyeOff= document.getElementById('icon-eye-off');
    if (input.type === 'password') {
        input.type = 'text';
        eye.style.display    = 'none';
        eyeOff.style.display = 'block';
    } else {
        input.type = 'password';
        eye.style.display    = 'block';
        eyeOff.style.display = 'none';
    }
}
</script>
{% endblock %}
